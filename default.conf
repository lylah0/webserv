server {
	server_name main;
	listen 8080;
	host localhost;
	root /path/of/your/webserv/websites/main;
	index index.html;
	client_max_body_size 10;
	error_page 404.html;
	location / {
		allow_methods POST GET;
		root idk/;
		index idk/;
		autoindex on;
	}
	location /upload {
		allow_methods POST;
		root idk/;
		autoindex on;
	}
	location /delete {
		allow_methods DELETE;
		root where/posts/are/uploaded;
	}
	location /cgi {
		allow_methods POST GET;
		root idk/;
		cgi .py /usr/bin/python3;
	}
}